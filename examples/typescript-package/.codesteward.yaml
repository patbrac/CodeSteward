project:
  name: example-typescript-package

mode:
  comment_only: true

review_readiness:
  max_files_changed: 12
  max_lines_changed: 500
  max_ownership_areas: 2

ownership:
  use_codeowners: true
  production_paths:
    - src/**
    - lib/**
    - packages/**
  ignore_paths:
    - docs/**
    - examples/**
    - README.md

tests:
  require_for:
    - src/**
    - lib/**
    - packages/**
  test_paths:
    - tests/**
    - test/**
    - "**/*.test.*"
    - "**/*.spec.*"
  path_mappings:
    - from: "src/{path}/{name}.{ext}"
      expect:
        - "tests/{path}/{name}.test.{ext}"
        - "tests/{path}/{name}.spec.{ext}"
        - "src/{path}/{name}.test.{ext}"
        - "src/{path}/{name}.spec.{ext}"

pr_description:
  warn_if_empty: true
  min_length: 80
  required_sections: []
  require_linked_issue: false

sensitive_paths:
  - package.json
  - package-lock.json
  - pnpm-lock.yaml
  - yarn.lock
  - .github/workflows/**
  - .gitlab-ci.yml
  - scripts/release/**
