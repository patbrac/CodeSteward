name: Feature request
description: Suggest an idea or improvement for CodeSteward
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. CodeSteward aims to stay small,
        deterministic, and focused on maintainer-time protection. Please note
        that some ideas are explicit v0 non-goals (AI review, security scanning,
        blocking, auto-labeling, auto-reviewer assignment, contributor
        moderation) and are unlikely to be accepted for v0.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This request fits CodeSteward's scope (deterministic, comment-only, no AI in v0).
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the maintainer or contributor pain point, not just the solution.
      placeholder: As a maintainer, I keep having to ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like CodeSteward to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have thought about or tried.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Which area does this touch?
      options:
        - Ownership / CODEOWNERS
        - Tests
        - Scope rules
        - Description rules
        - Sensitive paths
        - Scoring / status
        - Report rendering (Markdown/JSON)
        - GitHub integration
        - GitLab integration
        - Configuration
        - CLI
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Examples, mockups of the desired report output, or links that help explain the request.
    validations:
      required: false
