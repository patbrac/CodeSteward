name: Feature proposal
description: Propose a deterministic maintenance-intelligence outcome.
title: "[proposal] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem and evidence
      description: Who experiences the maintenance problem, and what non-sensitive evidence shows it?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Proposed outcome
      description: Describe observable behavior, not only an implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and non-goals
      description: Include the status quo and what this proposal deliberately excludes.
    validations:
      required: true
  - type: textarea
    id: trust
    attributes:
      label: Trust and compatibility impact
      description: Address deterministic evidence, non-execution/network defaults, privacy, resource bounds, public contracts, native platforms, and open-core boundary.
    validations:
      required: true
  - type: checkboxes
    id: process
    attributes:
      label: Process
      options:
        - label: I understand maintainers may require an ADR or public RFC before implementation.
          required: true
