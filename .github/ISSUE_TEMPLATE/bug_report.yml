name: Bug report
description: Report a reproducible, non-sensitive Code Steward defect.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not disclose a suspected vulnerability, secret, private source/history, or personal data here. Use the private route in SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Output of `steward version` or the exact commit.
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Native platform
      description: OS version, architecture, installation method, shell, and filesystem when relevant.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Minimal commands and synthetic fixture. Sanitize URLs, identities, source, tokens, and machine paths.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include bounded, sanitized stderr/stdout when useful.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Public-data confirmation
      options:
        - label: This report contains no vulnerability details, secrets, private source/history, personal data, or unsafe logs.
          required: true
