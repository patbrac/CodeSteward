name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

jobs:
  native:
    name: native-${{ matrix.id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: target/x86_64-unknown-linux-gnu/release/steward
          - id: macos-arm64
            runner: macos-15
            target: aarch64-apple-darwin
            binary: target/aarch64-apple-darwin/release/steward
          - id: windows-x64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            binary: target/x86_64-pc-windows-msvc/release/steward.exe
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          check-latest: false
          cache: pip
          cache-dependency-path: scripts/ci/requirements.txt

      - name: Install schema validator
        run: python -m pip install --disable-pip-version-check --requirement scripts/ci/requirements.txt

      - name: Install Rust target and required components
        run: rustup target add ${{ matrix.target }} && rustup component add rustfmt clippy

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Unit, integration, and golden tests
        run: cargo test --workspace --all-features --locked

      - name: Schema examples
        run: python scripts/ci/check_schema_examples.py

      - name: Public planning and repository contracts
        run: python scripts/ci/check_public_contracts.py

      - name: Workspace boundary regression tests
        run: python -m unittest discover -s scripts/ci -p "test_*.py"

      - name: Build native release binary
        run: cargo build --locked --release -p steward-cli --target ${{ matrix.target }}

      - name: Deterministic ordering smoke
        run: python scripts/ci/check_cli_determinism.py --binary ${{ matrix.binary }}

      - name: Native no-network smoke
        run: python scripts/ci/no_network_smoke.py --binary ${{ matrix.binary }}

      - name: Install pinned dependency-policy tool
        run: cargo install --locked cargo-deny --version 0.20.2

      - name: Dependency licenses, advisories, bans, and sources
        run: cargo deny --locked check

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out complete history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan all reachable history with pinned TruffleHog
        run: bash scripts/ci/secret_scan.sh

  reproducible-linux:
    name: reproducible-linux
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install release target
        run: rustup target add x86_64-unknown-linux-gnu

      - name: Compare two isolated builds
        run: bash scripts/ci/reproducible_linux.sh

      - name: Preserve reproducibility delta
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reproducibility-delta
          path: reproducibility-delta.txt
          if-no-files-found: ignore
          retention-days: 14

  required:
    name: required
    if: always()
    needs:
      - native
      - secret-scan
      - reproducible-linux
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Confirm every critical job passed
        env:
          NATIVE_RESULT: ${{ needs.native.result }}
          SECRET_RESULT: ${{ needs.secret-scan.result }}
          REPRO_RESULT: ${{ needs.reproducible-linux.result }}
        run: test "$NATIVE_RESULT" = success && test "$SECRET_RESULT" = success && test "$REPRO_RESULT" = success
